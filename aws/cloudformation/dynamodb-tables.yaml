AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  DynamoDB tables for the TimeWise Supply Chain platform. All tables use
  on-demand capacity and point-in-time recovery; time-series tables expire
  items via TTL. GSIs are provisioned only for access patterns the Lambda
  services actually query.

Parameters:
  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'staging', 'prod']
    Description: 'Environment name (suffixes every table name)'

Resources:
  # --- Forecasting -----------------------------------------------------------

  ForecastsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-forecasts-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: forecastId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: forecastId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ProductIndex
          KeySchema:
            - AttributeName: productId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  # --- Alerting ---------------------------------------------------------------

  AlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-alerts-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: alertId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: alertId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CategoryTimeIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  InventoryAlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-inventory-alerts-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: alertId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
        - AttributeName: severity
          AttributeType: S
      KeySchema:
        - AttributeName: alertId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ProductSeverityIndex
          KeySchema:
            - AttributeName: productId
              KeyType: HASH
            - AttributeName: severity
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  # --- Data platform ------------------------------------------------------------

  KPIsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-kpis-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: kpiId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: kpiId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-metrics-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: metricId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: metricId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  DataSourcesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-data-sources-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sourceId
          AttributeType: S
        - AttributeName: sourceType
          AttributeType: S
      KeySchema:
        - AttributeName: sourceId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TypeIndex
          KeySchema:
            - AttributeName: sourceType
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  # --- Optimization -------------------------------------------------------------

  OptimizationScenariosTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-optimization-scenarios-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: scenarioId
          AttributeType: S
      KeySchema:
        - AttributeName: scenarioId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  InventoryOptimizationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-inventory-optimizations-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: optimizationId
          AttributeType: S
        - AttributeName: productId
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: optimizationId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ProductIndex
          KeySchema:
            - AttributeName: productId
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  # --- Analytics ------------------------------------------------------------------

  ReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-reports-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: reportId
          AttributeType: S
      KeySchema:
        - AttributeName: reportId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  AnalyticsInsightsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-analytics-insights-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: insightId
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: insightId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: CategoryTimeIndex
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  # --- Governance -------------------------------------------------------------------

  AccessControlsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-access-controls-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: role
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: RoleIndex
          KeySchema:
            - AttributeName: role
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  GovernanceMetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-governance-metrics-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: metricId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: metricId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

  BiasDetectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'timewise-bias-detections-${Environment}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: detectionId
          AttributeType: S
        - AttributeName: modelComponent
          AttributeType: S
        - AttributeName: detectedAt
          AttributeType: S
      KeySchema:
        - AttributeName: detectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ModelIndex
          KeySchema:
            - AttributeName: modelComponent
              KeyType: HASH
            - AttributeName: detectedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: TimeWise

Outputs:
  ForecastsTableName:
    Value: !Ref ForecastsTable
    Export:
      Name: !Sub '${AWS::StackName}-ForecastsTable'
  AlertsTableName:
    Value: !Ref AlertsTable
    Export:
      Name: !Sub '${AWS::StackName}-AlertsTable'
  InventoryAlertsTableName:
    Value: !Ref InventoryAlertsTable
    Export:
      Name: !Sub '${AWS::StackName}-InventoryAlertsTable'
  KPIsTableName:
    Value: !Ref KPIsTable
    Export:
      Name: !Sub '${AWS::StackName}-KPIsTable'
  MetricsTableName:
    Value: !Ref MetricsTable
    Export:
      Name: !Sub '${AWS::StackName}-MetricsTable'
  DataSourcesTableName:
    Value: !Ref DataSourcesTable
    Export:
      Name: !Sub '${AWS::StackName}-DataSourcesTable'
  OptimizationScenariosTableName:
    Value: !Ref OptimizationScenariosTable
    Export:
      Name: !Sub '${AWS::StackName}-OptimizationScenariosTable'
  InventoryOptimizationsTableName:
    Value: !Ref InventoryOptimizationsTable
    Export:
      Name: !Sub '${AWS::StackName}-InventoryOptimizationsTable'
  ReportsTableName:
    Value: !Ref ReportsTable
    Export:
      Name: !Sub '${AWS::StackName}-ReportsTable'
  AnalyticsInsightsTableName:
    Value: !Ref AnalyticsInsightsTable
    Export:
      Name: !Sub '${AWS::StackName}-AnalyticsInsightsTable'
  AccessControlsTableName:
    Value: !Ref AccessControlsTable
    Export:
      Name: !Sub '${AWS::StackName}-AccessControlsTable'
  GovernanceMetricsTableName:
    Value: !Ref GovernanceMetricsTable
    Export:
      Name: !Sub '${AWS::StackName}-GovernanceMetricsTable'
  BiasDetectionsTableName:
    Value: !Ref BiasDetectionsTable
    Export:
      Name: !Sub '${AWS::StackName}-BiasDetectionsTable'
