AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  API Gateway REST API for the TimeWise Supply Chain platform. Each top-level
  resource plus a greedy {proxy+} child is routed via Lambda-proxy integration
  to one of six domain services. When UserPoolArn is provided, every ANY method
  requires a Cognito JWT; dedicated MOCK OPTIONS methods stay unauthenticated
  so browser CORS preflights succeed. Method-level routing is handled inside
  the Lambda router.

Parameters:
  Environment:
    Type: String
    Default: 'prod'
    AllowedValues: ['dev', 'staging', 'prod']
  UserPoolArn:
    Type: String
    Default: ''
    Description: 'Cognito user pool ARN; leave empty to deploy without authentication'
  ForecastsLambdaArn:
    Type: String
    Description: 'Forecasts service (also serves /sagemaker/inference)'
  AlertsLambdaArn:
    Type: String
    Description: 'Alerts service (also serves /inventory-alerts)'
  DataPlatformLambdaArn:
    Type: String
    Description: 'Data-platform service (/kpis, /metrics, /data-sources)'
  OptimizationLambdaArn:
    Type: String
    Description: 'Optimization service (/optimization-scenarios, /inventory-optimizations)'
  AnalyticsLambdaArn:
    Type: String
    Description: 'Analytics service (/reports, /analytics-insights)'
  GovernanceLambdaArn:
    Type: String
    Description: 'Governance service (/access-controls, /governance-metrics, /bias-detections)'

Conditions:
  HasUserPool: !Not [!Equals [!Ref UserPoolArn, '']]

Resources:
  TimeWiseAPI:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub 'timewise-api-${Environment}'
      Description: 'TimeWise Supply Chain API'
      EndpointConfiguration:
        Types: [REGIONAL]

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Condition: HasUserPool
    Properties:
      Name: !Sub 'timewise-cognito-${Environment}'
      RestApiId: !Ref TimeWiseAPI
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !Ref UserPoolArn

  # --- Lambda invoke permissions (one per service) -----------------------------

  ForecastsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ForecastsLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TimeWiseAPI}/*/*'

  AlertsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AlertsLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TimeWiseAPI}/*/*'

  DataPlatformInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DataPlatformLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TimeWiseAPI}/*/*'

  OptimizationInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OptimizationLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TimeWiseAPI}/*/*'

  AnalyticsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AnalyticsLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TimeWiseAPI}/*/*'

  GovernanceInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GovernanceLambdaArn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${TimeWiseAPI}/*/*'

  # --- /forecasts ---

  ForecastsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TimeWiseAPI
      ParentId: !GetAtt TimeWiseAPI.RootResourceId
      PathPart: 'forecasts'

  ForecastsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TimeWiseAPI
      ResourceId: !Ref ForecastsResource
      HttpMethod: ANY
      AuthorizationType: !If [HasUserPool, COGNITO_USER_POOLS, NONE]
      AuthorizerId: !If [HasUserPool, !Ref CognitoAuthorizer, !Ref 'AWS::NoValue']
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ForecastsLambdaArn}/invocations'

  ForecastsOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref TimeWiseAPI
      ResourceId: !Ref ForecastsResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE  # CORS preflights carry no Authorization header
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 204
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,Authorization'"
              method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 204
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  ForecastsProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref TimeWiseAPI
      ParentId: !Ref ForecastsResource
      PathPart: '{proxy+}'

  ForecastsProxyMethod:
