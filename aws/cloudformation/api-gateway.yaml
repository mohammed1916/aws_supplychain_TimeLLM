  # --- Deployment & stage --------------------------------------------------------

  # Note: rename the logical ID (e.g. APIDeployment2) to force a new deployment
  # when only method/integration configuration changes.
  APIDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - ForecastsMethod
      - ForecastsOptionsMethod
      - ForecastsProxyMethod
      - ForecastsProxyOptionsMethod
      - SageMakerOptionsMethod
      - SageMakerProxyMethod
      - SageMakerProxyOptionsMethod
      - AlertsMethod
      - AlertsOptionsMethod
      - AlertsProxyMethod
      - AlertsProxyOptionsMethod
      - InventoryAlertsMethod
      - InventoryAlertsOptionsMethod
      - InventoryAlertsProxyMethod
      - InventoryAlertsProxyOptionsMethod
      - KpisMethod
      - KpisOptionsMethod
      - MetricsMethod
      - MetricsOptionsMethod
      - DataSourcesMethod
      - DataSourcesOptionsMethod
      - DataSourcesProxyMethod
      - DataSourcesProxyOptionsMethod
      - OptimizationScenariosMethod
      - OptimizationScenariosOptionsMethod
      - OptimizationScenariosProxyMethod
      - OptimizationScenariosProxyOptionsMethod
      - InventoryOptimizationsMethod
      - InventoryOptimizationsOptionsMethod
      - InventoryOptimizationsProxyMethod
      - InventoryOptimizationsProxyOptionsMethod
      - ReportsMethod
      - ReportsOptionsMethod
      - ReportsProxyMethod
      - ReportsProxyOptionsMethod
      - AnalyticsInsightsMethod
      - AnalyticsInsightsOptionsMethod
      - AccessControlsMethod
      - AccessControlsOptionsMethod
      - AccessControlsProxyMethod
      - AccessControlsProxyOptionsMethod
      - GovernanceMetricsMethod
      - GovernanceMetricsOptionsMethod
      - BiasDetectionsMethod
      - BiasDetectionsOptionsMethod
    Properties:
      RestApiId: !Ref TimeWiseAPI

  APIStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref TimeWiseAPI
      DeploymentId: !Ref APIDeployment
      StageName: !Ref Environment
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          MetricsEnabled: true
          ThrottlingBurstLimit: 100
          ThrottlingRateLimit: 50

Outputs:
  APIGatewayURL:
    Description: 'API Gateway endpoint URL (set as VITE_API_GATEWAY_URL)'
    Value: !Sub 'https://${TimeWiseAPI}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-APIGatewayURL'
  APIGatewayId:
    Description: 'API Gateway ID'
    Value: !Ref TimeWiseAPI
    Export:
      Name: !Sub '${AWS::StackName}-APIGatewayId'
